<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Video de tecnica guiada</title>
  <desc id="desc">Miniatura generada para la galeria de Walter Entrenamiento.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#701D2A"/>
      <stop offset="100%" stop-color="#3A0C13"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="800" cy="600" r="150" fill="rgba(255,255,255,0.16)"/>
  <polygon points="760,520 760,680 900,600" fill="#ffffff"/>
  <text x="120" y="900" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="68" font-weight="700">Tecnica guiada</text>
  <text x="120" y="980" fill="rgba(255,255,255,0.84)" font-family="Quicksand, Arial, sans-serif" font-size="34">Detalle de ejecucion para entrenar con mejor control y seguridad.</text>
</svg>
