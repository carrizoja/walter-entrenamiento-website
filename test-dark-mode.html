<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">
    <div class="p-8">
        <h1 class="text-4xl font-bold mb-4">Dark Mode Test</h1>
        <div class="bg-gray-50 dark:bg-gray-800 p-6 rounded-lg mb-4">
            <p>This should change background in dark mode</p>
        </div>
        <button 
            onclick="toggleDarkMode()" 
            class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
        >
            Toggle Dark Mode
        </button>
    </div>
    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                console.log('Switched to LIGHT mode');
            } else {
                html.classList.add('dark');
                console.log('Switched to DARK mode');
            }
        }
    </script>
</body>
</html>
